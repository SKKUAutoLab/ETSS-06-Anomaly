seed_everything : 2024

trainer:
  accelerator: gpu
  devices: 1
  precision: 32
  max_epochs: 40
  log_every_n_steps: 4
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: PreVAD
      save_dir: ./logs
  callbacks:
#    - class_path: FixTQDMProgressBar
#    - class_path: lightning.pytorch.callbacks.RichProgressBar
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: Valid/AUROC_2
        mode: max
        save_top_k: 1
        verbose: True
        auto_insert_metric_name: False
        filename: "epoch{epoch:02d}-AUROC{Valid/AUROC_2:.4f}"
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: Valid/AP_1
        mode: max
        save_top_k: 1
        verbose: True
        auto_insert_metric_name: False
        filename: "epoch{epoch:02d}-AP{Valid/AP_1:.4f}"
    - class_path: lightning.pytorch.callbacks.ModelSummary
      init_args:
        max_depth: 3
    - class_path: utils.SavePredResults
      init_args:
        output_dir: ''

model:
  class_path: models.LaGoVAD.LaGoVADLightModel
  init_args:
    model_config:
      class_path: models.LaGoVAD.LaGoVADModelConfig
      init_args:
        clip_name: openai/clip-vit-base-patch16
        hidden_size: 512
        num_soft_prompts: 32
        verbalizer_type:

        temp_enc_type: RoFormer
        temp_gate:
        temp_encoder_layers: 2
        temp_attention_heads: 4
        temp_window_size: 25

        fusion_type: co_attn
        fusion_num_layers: 2

        head_num_layers: 1
        head_activation: gelu
        head_norm: layernorm
        head_kernel_size: 9

        multi_head_type: sim
        bin_head_type: adaptive

    training_config:
      class_path: models.LaGoVAD.LaGoVADTrainingConfig
      init_args:
        lr: 5e-5
        weight_decay: 0.0
        lr_scheduler_name: cosine
        lr_scheduler_kwargs:
          num_warmup_steps: 20
#          num_training_steps: 4410

        mil_topk_pct: 16
        sup_mil_topk_pct: 4
        mul_mil_topk_pct: 16
        smooth_reg_weight: 0.0
        sparsity_reg_weight: 0.0
        mul_sparsity_reg_weight: 0.0
        pseudo_sup_weight: 1.0
        pseudo_sup_mil_weight: 1.0
        anomaly_cap_contrastive_weight: 1.0
        contrastive_neg_mining: n3
        contrastive_temp: 0.02
        anomaly_cap_forward: true
        score_type: binary
        mul_score_type: vanilla
        mul_mil_type: v1
        temp_gate_init: 0.0
        save_res_mode: fix10
        frame_time:
          - 8
          - 8
          - 8
          - 8
          - 2
          - 1
          - 8
          - 8

data:
  class_path: datasets.PreVADDataModule
  init_args:
    train_data_root: data/PreVAD
    val_data_root: data/PreVAD
    batch_size: 64
    heuristic_synthesis: False
    enhance_single_clip_factor: 0.3
    random_crop_normal: True
    syn_max_num_clips: 5
    vis_max_len: 512
    eval_datasets: "prevad,xd,ucf,msad,ubnormal,dota,tad,lad"
    retrieval_based_synthesis: True
    retrieval_cache: v6/train_search_cache.json
